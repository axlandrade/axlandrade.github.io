<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar no site</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #7a4db4, #d1a3ff);
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
      text-align: center;
      max-width: 400px;
    }
    input[type="password"] {
      padding: 10px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: 100%;
      margin-bottom: 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 1rem;
      background-color: #7a4db4;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .error {
      color: red;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Bem-vindo 💜</h2>
    <p>Digite a senha para entrar:</p>
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="verificarSenha()">Entrar</button>
    <p id="erro" class="error">Senha incorreta. Tente novamente.</p>
  </div>

  <script>
    function verificarSenha() {
      const senha = document.getElementById("senha").value;
      const erro = document.getElementById("erro");
      if (senha === "0105") {
        window.location.href = "index.html";
      } else {
        erro.style.display = "block";
      }
    }
  </script>
</body>
</html>
