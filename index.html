
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nosso Amor</title>
    <link rel="stylesheet" href="style.css">
    <script>
        function atualizarContadores() {
            const dataEncontro = new Date("2025-04-21");
            const dataNamoro = new Date("2025-05-01");
            const hoje = new Date();
            
            const diffEncontro = Math.floor((hoje - dataEncontro) / (1000 * 60 * 60 * 24));
            const diffNamoro = Math.floor((hoje - dataNamoro) / (1000 * 60 * 60 * 24));
            
            document.getElementById("contador-encontro").textContent = diffEncontro + " dias desde nosso primeiro encontro.";
            document.getElementById("contador-namoro").textContent = diffNamoro + " dias de namoro.";
        }
        window.onload = atualizarContadores;
    </script>
</head>
<body>
    <div class="container">
        <h1>Bem-vinda ao nosso cantinho 💜</h1>
        <p id="contador-encontro"></p>
        <p id="contador-namoro"></p>
        <a href="pedido.html" class="btn">Ver o pedido de namoro</a>
    </div>
    <audio autoplay loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>
</body>
</html>
